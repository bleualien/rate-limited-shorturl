services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    # --- PROPER NGINX CONFIGURATION ---
    command: /bin/sh -c "echo 'server { listen 80; location / { root /usr/share/nginx/html; index index.html; try_files $$uri $$uri/ /index.html; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"